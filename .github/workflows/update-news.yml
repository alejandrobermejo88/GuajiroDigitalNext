name: Daily News Update

on:
  schedule:
    # Runs every day at 06:00 UTC (02:00 ET / 01:00 CT)
    - cron: '0 6 * * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  update-news:
    name: Fetch and update Cuba news
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest Cuba news
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: npm run update-news

      - name: Commit updated news.json
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/news.json
          git diff --staged --quiet || git commit -m "chore: update news [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
